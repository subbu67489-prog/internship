<!DOCTYPE html>
<html>
    <head>
        <title>forms</title>

    <body>
        <h1>registration</h1>
        <form action="index.html">
            name<input type="text" placeholder="enter your name"<br><br>

            gender<input type="radio" name="gender">male<br><br>
            <input type="radio" name="gender">female<br><br>
             skills<input type="checkbox" name="skills">html<br><br>
             <input type="checkbox" name="skills">css<br><br>
                <input type="checkbox" name="skills">javascript<br><br>
                 <input type="checkbox" name="skills">python<br><br>
                  <input type="checkbox" name="skills">java<br><br>
                  DOB<input type="date"><br><br>
                time<input type="time"><br><br>

        state<select name="state">
            <option>ap</option>
            <option>telangana</option>
            <option>odisha</option>

            </select><br><br>
            skills<select multiple="4">

    college name<input list="clg" type="list">

</form>
